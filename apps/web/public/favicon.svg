<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Globe background -->
  <circle cx="32" cy="32" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <!-- Equator -->
  <ellipse cx="32" cy="32" rx="28" ry="8" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <!-- Upper latitude -->
  <ellipse cx="32" cy="22" rx="22" ry="5" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <!-- Lower latitude -->
  <ellipse cx="32" cy="42" rx="22" ry="5" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <!-- Prime meridian -->
  <ellipse cx="32" cy="32" rx="8" ry="28" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <!-- Secondary meridian -->
  <ellipse cx="32" cy="32" rx="20" ry="28" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <!-- Outer ring highlight -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
</svg>
